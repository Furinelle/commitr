name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # GitHub Environment "pypi" — configure trusted publishing here:
    #   https://pypi.org/manage/project/commitr/settings/publishing/
    environment:
      name: pypi
      url: https://pypi.org/project/commitr/
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing — no token needed)
        uses: pypa/gh-action-pypi-publish@release/v1
