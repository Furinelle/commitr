name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # GitHub Environment "pypi" — configure trusted publishing here:
    #   https://pypi.org/manage/project/commitr/settings/publishing/
    environment:
      name: pypi
      url: https://pypi.org/project/commitr/
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing — no token needed)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write     # required to create a release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so CHANGELOG.md parsing works

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section for this version: from "## [X.Y.Z]" to the next "## ["
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $GITHUB_REF_NAME" > release-notes.md
          fi
          {
            echo ""
            echo "**Install:** \`pip install commitr==$version\`"
            echo ""
            echo "[PyPI](https://pypi.org/project/commitr/$version/) · [Changelog](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)"
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          make_latest: true
          fail_on_unmatched_files: true
